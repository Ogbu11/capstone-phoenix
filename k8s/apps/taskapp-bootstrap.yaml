apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: taskapp-deployment
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Ogbu11/capstone-phoenix.git'
    targetRevision: HEAD
    # The folder tracking your app deployment components (Frontend, Backend, DB manifests)
    path: k8s/apps/taskapp
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
