apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: taskapp-db
  namespace: default
spec:
  serviceName: "taskapp-db-service"
  replicas: 1
  selector:
    matchLabels:
      app: taskapp-db
  template:
    metadata:
      labels:
        app: taskapp-db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_DB
          value: taskapp
        - name: POSTGRES_USER
          value: phoenix_user
        - name: POSTGRES_PASSWORD
          value: qY9emJoVHFB49ocH
        ports:
        - containerPort: 5432
          name: dbport
        # Core Requirement: Health check probes for database status
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "phoenix_user", "-d", "taskapp"]
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "phoenix_user", "-d", "taskapp"]
          initialDelaySeconds: 5
          periodSeconds: 5
        # Core Requirement: Defined container limits and constraints
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: db-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: taskapp-db-service
  namespace: default
spec:
  selector:
    app: taskapp-db
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskapp-backend
  namespace: default
spec:
  replicas: 2
  # Core Requirement: Rolling update zero-downtime policy configurations
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: taskapp-backend
  template:
    metadata:
      labels:
        app: taskapp-backend
    spec:
      # Core Requirement: Pod Anti-Affinity forces replicas to spread to separate nodes
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - taskapp-backend
            topologyKey: "kubernetes.io/hostname"
      containers:
      - name: backend
        # Fixed: Correct GHCR registry namespace + pinned sample tag (update with your actual commit/tag)
        image: ghcr.io/ts-a-devops/taskapp-backend:v1.0.0 
        env:
        - name: DB_HOST
          value: "taskapp-db-service"
        - name: DB_NAME
          value: "taskapp"
        - name: DB_USER
          value: "phoenix_user"
        - name: DB_PASSWORD
          value: "qY9emJoVHFB49ocH"
        ports:
        - containerPort: 5000
        # Core Requirement: Health check tracking endpoints
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: taskapp-backend-service
  namespace: default
spec:
  selector:
    app: taskapp-backend
  ports:
  - port: 5000
    targetPort: 5000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskapp-frontend
  namespace: default
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: taskapp-frontend
  template:
    metadata:
      labels:
        app: taskapp-frontend
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - taskapp-frontend
            topologyKey: "kubernetes.io/hostname"
      containers:
      - name: frontend
        # Fixed: Correct GHCR registry namespace + pinned sample tag
        image: ghcr.io/ts-a-devops/taskapp-frontend:v1.0.0
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5
        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
          limits:
            memory: "64Mi"
            cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: taskapp-frontend-service
  namespace: default
spec:
  selector:
    app: taskapp-frontend
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
