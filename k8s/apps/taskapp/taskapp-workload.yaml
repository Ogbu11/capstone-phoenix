apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskapp-frontend
  namespace: default
  labels:
    app: taskapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskapp
  template:
    metadata:
      labels:
        app: taskapp
    spec:
      containers:
      - name: web
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: taskapp-service
  namespace: default
spec:
  selector:
    app: taskapp
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP
