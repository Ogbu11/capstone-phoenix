apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: taskapp-db
  namespace: default
spec:
  serviceName: "taskapp-db-service"
  replicas: 1
  selector:
    matchLabels:
      app: taskapp-db
  template:
    metadata:
      labels:
        app: taskapp-db
    spec:
      hostNetwork: true
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_DB
          value: taskapp
        - name: POSTGRES_USER
          value: phoenix_user
        - name: POSTGRES_PASSWORD
          value: qY9emJoVHFB49ocH
        ports:
        - containerPort: 5432
          name: dbport
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "phoenix_user", "-d", "taskapp"]
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "phoenix_user", "-d", "taskapp"]
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: db-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: taskapp-db-service
  namespace: default
spec:
  selector:
    app: taskapp-db
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskapp-backend
  namespace: default
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: taskapp-backend
  template:
    metadata:
      labels:
        app: taskapp-backend
    spec:
      hostNetwork: true
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - taskapp-backend
            topologyKey: "kubernetes.io/hostname"
      imagePullSecrets:
        - name: ghcr-secret
      containers:
      - name: backend
        image: ghcr.io/ts-a-devops/taskapp-backend:5d6b8fc
        env:
        - name: POSTGRES_HOST
          value: 127.0.0.1
        - name: DATABASE_URL
          value: postgresql://phoenix_user:qY9emJoVHFB49ocH@127.0.0.1:5432/taskapp
        - name: POSTGRES_DB
          value: taskapp
        - name: POSTGRES_USER
          value: phoenix_user
        - name: POSTGRES_PASSWORD
          value: qY9emJoVHFB49ocH
        - name: DB_HOST
          value: 127.0.0.1
        ports:
        - containerPort: 5000
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: taskapp-backend-service
  namespace: default
spec:
  selector:
    app: taskapp-backend
  ports:
  - port: 5000
    targetPort: 5000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskapp-frontend
  namespace: default
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: taskapp-frontend
  template:
    metadata:
      labels:
        app: taskapp-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
      - name: frontend
        image: ghcr.io/ts-a-devops/taskapp-frontend:5d6b8fc
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
          limits:
            memory: "64Mi"
            cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: taskapp-frontend-service
  namespace: default
spec:
  selector:
    app: taskapp-frontend
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
